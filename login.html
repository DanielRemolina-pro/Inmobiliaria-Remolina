<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inmobiliaria Remolina</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Inmobiliaria Remolina</div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="auth" class="auth-section">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button type="button" class="auth-tab active" data-target="login-form">Iniciar sesión</button>
                    <button type="button" class="auth-tab" data-target="register-form">Crear cuenta</button>
                </div>

                <div class="auth-forms">
                    <form id="login-form" class="auth-form active">
                        <h2>Iniciar sesión</h2>
                        <input type="email" id="login-email" placeholder="Correo electrónico" required>
                        <div class="password-wrapper">
                            <input type="password" id="login-password" placeholder="Contraseña" required>
                            <button type="button" class="toggle-password">Mostrar</button>
                        </div>
                        <button type="submit">Entrar</button>
                        <p class="auth-message" id="login-message"></p>
                    </form>

                    <form id="register-form" class="auth-form oculto">
                        <h2>Crear cuenta</h2>
                        <input type="text" id="register-name" placeholder="Nombre completo" required>
                        <input type="email" id="register-email" placeholder="Correo electrónico" required>
                        <div class="password-wrapper">
                            <input type="password" id="register-password" placeholder="Contraseña (mín. 6 caracteres)" required>
                            <button type="button" class="toggle-password">Mostrar</button>
                        </div>
                        <button type="submit">Registrarse</button>
                        <p class="auth-message" id="register-message"></p>
                    </form>
                </div>

                <div id="user-welcome" class="auth-welcome oculto">
                    <p>Bienvenido, <span id="user-name"></span></p>
                    <button id="logout-button" class="logout-button">Cerrar sesión</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="auth.js"></script>
</body>
</html>
