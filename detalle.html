<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de propiedad — Remolina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    :root {
      --obsidian: #0d0d0d;
      --obsidian-2: #141414;
      --obsidian-3: #1a1a1a;
      --gold: #c9a84c;
      --gold-light: #e8c96e;
      --gold-dim: rgba(201,168,76,0.12);
      --gold-border: rgba(201,168,76,0.25);
      --white: #f5f3ee;
      --muted: rgba(245,243,238,0.5);
      --border-soft: rgba(255,255,255,0.07);
      --nav-h: 70px;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Outfit', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--obsidian);
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.6;
    }

    a { color: var(--gold); text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.75; }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ─── BREADCRUMB ─── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 2rem 0 3rem;
    }
    .breadcrumb .sep { opacity: 0.35; }
    .breadcrumb .current { color: var(--gold); }

    /* ─── HERO GALLERY ─── */
    .gallery-hero {
      display: block;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 1rem;
      height: 500px;
    }

    .gallery-hero .main-shot {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .gallery-hero .side-shot {
      display: none;
    }

    .gallery-hero .side-shot:last-child {
      display: none;
    }

    .gallery-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .gallery-hero .main-shot:hover img,
    .gallery-hero .side-shot:hover img {
      transform: scale(1.04);
    }

    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 50%);
      pointer-events: none;
    }

    .see-all-btn {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      border: 1px solid var(--gold-border);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .see-all-btn:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--obsidian);
    }

    /* ─── THUMBNAIL STRIP (extra images) ─── */
    .thumb-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin-bottom: 3.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-border) transparent;
    }
    .thumb-strip::-webkit-scrollbar { height: 3px; }
    .thumb-strip::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 99px; }

    .thumb-item {
      flex: 0 0 120px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, opacity 0.2s;
      opacity: 0.6;
    }
    .thumb-item.active, .thumb-item:hover { border-color: var(--gold); opacity: 1; }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* PLACEHOLDER THUMBNAILS */
    .thumb-placeholder {
      flex: 0 0 120px;
      height: 80px;
      border-radius: 8px;
      border: 1.5px dashed var(--gold-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .thumb-placeholder:hover { border-color: var(--gold); color: var(--gold); }
    .thumb-placeholder svg { opacity: 0.5; }

    /* ─── MAIN CONTENT ─── */
    .detalle-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 3rem;
      align-items: start;
    }

    .det-tipo {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold-border);
      background: var(--gold-dim);
      padding: 0.3rem 0.85rem;
      border-radius: 99px;
      margin-bottom: 1.2rem;
    }

    .det-titulo {
      font-family: var(--font-display);
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin-bottom: 1rem;
    }

    .det-ubicacion {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .det-ubicacion svg { flex-shrink: 0; }

    /* STATS ROW */
    .det-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border-soft);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 3rem;
    }
    .det-stat {
      background: var(--obsidian-2);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .det-stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .det-stat-value {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--white);
    }
    .det-stat-icon {
      font-size: 1.1rem;
      margin-bottom: 0.2rem;
    }

    /* SEPARATOR */
    .det-sep {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 0 0 2rem;
    }

    /* DESCRIPCIÓN */
    .det-desc-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 1.25rem;
      letter-spacing: 0.01em;
    }

    .det-desc-block {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .det-desc-item {
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border-soft);
      color: rgba(245,243,238,0.78);
      font-size: 0.95rem;
      line-height: 1.75;
      position: relative;
      padding-left: 1rem;
    }
    .det-desc-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold);
    }

    /* CARACTERÍSTICAS ADICIONALES */
    .det-extra-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border-soft);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 3rem;
    }
    .det-extra-item {
      background: var(--obsidian-2);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .det-extra-label {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .det-extra-val {
      font-size: 0.9rem;
      color: var(--white);
      font-weight: 400;
    }

    /* ─── RIGHT: SIDEBAR ─── */
    .det-sidebar {
      position: sticky;
      top: calc(var(--nav-h, 70px) + 1.5rem);
    }

    .precio-card {
      background: var(--obsidian-3);
      border: 1px solid var(--gold-border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .precio-header {
      background: linear-gradient(135deg, #1e1700, #2a1e00);
      padding: 1.75rem 2rem;
      border-bottom: 1px solid var(--gold-border);
    }
    .precio-label {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
      opacity: 0.8;
    }
    .precio-valor {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 400;
      color: var(--gold-light);
      line-height: 1;
    }
    .precio-nota {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .precio-body {
      padding: 1.75rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn-contactar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 1rem;
      background: var(--gold);
      color: var(--obsidian);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s, transform 0.15s;
    }
    .btn-contactar:hover {
      background: var(--gold-light);
      transform: translateY(-1px);
      opacity: 1;
    }
    .btn-contactar:active { transform: translateY(0); }

    .btn-wsp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.9rem;
      background: transparent;
      color: var(--white);
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-wsp:hover {
      border-color: #25D366;
      background: rgba(37,211,102,0.07);
      color: #25D366;
      opacity: 1;
    }

    .sidebar-meta {
      background: var(--obsidian-3);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 1.5rem;
    }
    .sidebar-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border-soft);
      font-size: 0.85rem;
    }
    .sidebar-meta-row:last-child { border-bottom: none; }
    .sidebar-meta-row .key { color: var(--muted); }
    .sidebar-meta-row .val { font-weight: 500; }

    /* ─── LIGHTBOX ─── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
    }
    .lightbox-inner img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
      display: block;
    }
    .lb-close {
      position: absolute;
      top: -2.5rem;
      right: 0;
      background: none;
      border: none;
      color: var(--white);
      font-size: 1.5rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .lb-close:hover { opacity: 1; }
    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--gold-border);
      color: var(--white);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .lb-nav:hover { background: var(--gold); color: var(--obsidian); }
    .lb-prev { left: -3.5rem; }
    .lb-next { right: -3.5rem; }
    .lb-counter {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1024px) {
      .detalle-grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .det-sidebar { position: static; }
      .gallery-hero { height: 420px; }
    }

    @media (max-width: 768px) {
      .gallery-hero { height: 260px; }
      .det-stats { grid-template-columns: repeat(3, 1fr); }
      .det-extra-grid { grid-template-columns: 1fr; }
      .lb-prev { left: -2rem; }
      .lb-next { right: -2rem; }
    }

    /* ─── ENTRANCE ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-1 { animation: fadeUp 0.6s ease both; }
    .anim-2 { animation: fadeUp 0.6s 0.1s ease both; }
    .anim-3 { animation: fadeUp 0.6s 0.2s ease both; }
    .anim-4 { animation: fadeUp 0.6s 0.3s ease both; }

    /* GOLD LINE ACCENT */
    .gold-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.3;
      margin: 3.5rem 0;
    }
  </style>
</head>

    <!-- DETALLE GRID — galería + info izq / sidebar der -->

      <!-- ── COLUMNA IZQUIERDA: galería + info ── -->

            <a href="https://wa.me/573000000000" target="_blank" class="btn-wsp">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">

        <div class="sidebar-meta" id="sidebarMeta">
          <div class="sidebar-meta-row">

          <div class="sidebar-meta-row">
            <span class="key">Estado</span>
            <span class="val" id="metaEstado">—</span>

          <div class="sidebar-meta-row">
            <span class="key">Ciudad</span>
            <span class="val" id="metaCiudad">—</span>
          </div>
          <div class="sidebar-meta-row">
            <span class="key">Área</span>
            <span class="val" id="metaArea">—</span>

          <div class="sidebar-meta-row">

<!-- ─── LIGHTBOX ─── -->
<div class="lightbox" id="lightbox" onclick="cerrarLightbox()">
  <div class="lightbox-inner" onclick="event.stopPropagation()">
    <button class="lb-close" onclick="cerrarLightbox()">✕</button>
    <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
    <img id="lbImg" src="" alt="">
    <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
    <div class="lb-counter" id="lbCounter">1 / 1</div>
  </div>
</div>

<script>
  // ── Auth state + nav (Django session API) ──────────────────────────────
  const AUTH_API  = 'http://127.0.0.1:8000/api/auth';
  const PROPS_API = 'http://127.0.0.1:8000/api/propiedades';
  let currentUser = null;

  async function getCsrfToken() {
    const m = document.cookie.match(/csrftoken=([^;]+)/);
    if (m) return m[1];
    const r = await fetch(`${AUTH_API}/csrf/`, { credentials: 'include' });
    return (await r.json()).csrfToken;
  }

  (async () => {
    const navUser     = document.getElementById('navUser');
    const navLoginBtn = document.getElementById('navLoginBtn');
    try {
      const res = await fetch(`${AUTH_API}/me/`, { credentials: 'include' });
      if (res.ok) {
        currentUser = await res.json();
        document.getElementById('navUserName').textContent =
          currentUser.first_name || currentUser.username || currentUser.email;
        navUser.classList.remove('oculto');
        navLoginBtn.classList.add('oculto');
      } else {
        navUser.classList.add('oculto');
        navLoginBtn.classList.remove('oculto');
      }
    } catch {
      navUser.classList.add('oculto');
      navLoginBtn.classList.remove('oculto');
    }
  })();

  document.getElementById('navLogout')?.addEventListener('click', async (e) => {
    e.preventDefault();
    const csrf = await getCsrfToken();
    await fetch(`${AUTH_API}/logout/`, {
      method: 'POST',
      headers: { 'X-CSRFToken': csrf, 'Content-Type': 'application/json' },
      credentials: 'include',
    });
    window.location.reload();
  });

  document.getElementById('navHamburger')?.addEventListener('click', () => {
    document.getElementById('navMenu').classList.toggle('open');
  });

  // ── Navbar scroll
  const navbar = document.getElementById('navbar');
  if (navbar) {
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 30);
    });
  }

  let allImgs = [];
  let lbIdx  = 0;

  /* ── LIGHTBOX ── */
  function abrirLightbox(i) {
    lbIdx = i;
    actualizarLb();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function cerrarLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lbNav(dir) {
    lbIdx = (lbIdx + dir + allImgs.length) % allImgs.length;
    actualizarLb();
  }

  function actualizarLb() {
    document.getElementById('lbImg').src = allImgs[lbIdx] || '';
    document.getElementById('lbCounter').textContent = `${lbIdx + 1} / ${allImgs.length}`;
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
    if (e.key === 'Escape')     cerrarLightbox();
  });

  /* ── CARGA ── */
  async function cargarDetalle() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) return;

    try {
      const res = await fetch(`http://127.0.0.1:8000/api/propiedades/${id}/`);
      const p   = await res.json();

      // ── Títulos y meta ──
      document.title = p.titulo + ' — Remolina';
      document.getElementById('breadTitle').textContent  = p.titulo;
      document.getElementById('detTitulo').textContent   = p.titulo;
      document.getElementById('metaId').textContent      = '#' + id;

      // ── Tipo ──
      if (p.tipo) {
        document.getElementById('detTipo').textContent  = p.tipo;
        document.getElementById('metaTipo').textContent = p.tipo;
      }

      // ── Precio ──
      document.getElementById('detPrecio').textContent =
        p.precio ? '$' + p.precio.toLocaleString('es-CO') : 'Consultar precio';
      document.getElementById('detPrecioNota').textContent =
        p.precio ? 'Negociable • Financiación disponible' : '';

      // ── Ubicación ──
      const ubText = [p.ubicacion, p.ciudad, 'Tolima'].filter(Boolean).join(' — ');
      document.getElementById('ubicacionText').textContent = ubText;

      // ── Estado y ciudad (sidebar) ──
      document.getElementById('metaEstado').textContent = p.estado || '—';
      document.getElementById('metaCiudad').textContent = p.ciudad ? p.ciudad + ', Tolima' : '—';

      // ── Área ──
      let areaStr = '—';
      if (p.area) {
        areaStr = p.area >= 10000
          ? (p.area / 10000).toFixed(2) + ' ha'
          : p.area.toLocaleString('es-CO') + ' m²';
      }
      document.getElementById('metaArea').textContent = areaStr;

      // ── Stats row ──
      const statsData = [
        { icon: '📐', label: 'Área',   value: areaStr },
        { icon: '🏷️', label: 'Tipo',   value: p.tipo  || '—' },
        { icon: '✅', label: 'Estado', value: p.estado || '—' },
      ];
      document.getElementById('detStats').innerHTML = statsData.map(s => `
        <div class="det-stat">
          <div class="det-stat-icon">${s.icon}</div>
          <div class="det-stat-label">${s.label}</div>
          <div class="det-stat-value">${s.value}</div>
        </div>
      `).join('');

      // ── Descripción ──
      const frases = (p.descripcion || '').split('.')
        .map(d => d.trim()).filter(Boolean);
      document.getElementById('detDesc').innerHTML = frases.map(f => `
        <div class="det-desc-item">${f}.</div>
      `).join('');

      // ── Extras adicionales (si existen) ──
      const extras = [];
      if (p.habitaciones) extras.push({ label: 'Habitaciones', val: p.habitaciones });
      if (p.banos)        extras.push({ label: 'Baños',        val: p.banos        });
      if (p.parqueadero)  extras.push({ label: 'Parqueadero',  val: p.parqueadero  });
      if (p.estrato)      extras.push({ label: 'Estrato',      val: p.estrato      });

      if (extras.length) {
        const grid = document.getElementById('detExtras');
        grid.style.display = 'grid';
        grid.innerHTML = extras.map(e => `
          <div class="det-extra-item">
            <div class="det-extra-label">${e.label}</div>
            <div class="det-extra-val">${e.val}</div>
          </div>
        `).join('');
      }

      // ── IMÁGENES principales ──
      allImgs = [];
      if (p.imagen_display) allImgs.push(p.imagen_display);
      else if (p.imagen_url) allImgs.push(p.imagen_url);
      // Si la API devuelve un array imagenes[]
      if (Array.isArray(p.imagenes)) {
        p.imagenes.forEach(img => {
          const src = img.imagen ? "http://127.0.0.1:8000" + img.imagen : img.url;
          if (src && !allImgs.includes(src)) allImgs.push(src);
        });
      }
      if (allImgs.length === 0) allImgs.push("videos/dani.png");

      // Galería hero
      document.getElementById('mainHeroImg').src = allImgs[0] || '';
      document.getElementById('side1Img').src    = allImgs[1] || allImgs[0] || '';
      document.getElementById('side2Img').src    = allImgs[2] || allImgs[0] || '';

      if (allImgs.length < 2) document.getElementById('heroSide1').style.display = 'none';
      if (allImgs.length < 3) document.getElementById('heroSide2').style.display = 'none';

      // Thumbnails
      const strip = document.getElementById('thumbStrip');
      const thumbsHTML = allImgs.map((src, i) => `
        <div class="thumb-item ${i === 0 ? 'active' : ''}"
             onclick="seleccionarThumb(${i})">
          <img src="${src}" alt="Vista ${i + 1}">
        </div>
      `).join('');

      // Placeholders al final
      const phCount = Math.max(0, 3 - allImgs.length);
      const phHTML = Array.from({length: phCount}).map(() => `
        <div class="thumb-placeholder">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <path d="M12 8v8M8 12h8"/>
          </svg>
          <span>+ Foto</span>
        </div>
      `).join('');

      strip.innerHTML = thumbsHTML + phHTML;

      // ── Panel de administración (solo is_staff) ───────────────────────
      if (currentUser?.is_staff) {
        let adminPanel = document.getElementById('adminPanel');
        if (!adminPanel) {
          adminPanel = document.createElement('div');
          adminPanel.id = 'adminPanel';
          adminPanel.style.cssText =
            'display:flex;gap:0.75rem;margin:1.5rem 0;padding:1rem;' +
            'background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.25);border-radius:0.5rem;';
          adminPanel.innerHTML = `
            <span style="flex:1;color:var(--ivory-dim,#aaa);font-size:0.85rem;align-self:center;">
              ⚙ Panel de administrador
            </span>
            <a href="admin-editar.html?id=${id}"
               style="padding:0.5rem 1.25rem;background:#d97706;color:#fff;border-radius:0.4rem;font-size:0.9rem;text-decoration:none;">
              ✏ Editar propiedad
            </a>
            <button id="btnEliminarProp"
              style="padding:0.5rem 1.25rem;background:#dc2626;color:#fff;border:none;border-radius:0.4rem;font-size:0.9rem;cursor:pointer;">
              🗑 Eliminar
            </button>
          `;
          // Insertar después del breadcrumb
          const breadcrumb = document.querySelector('.breadcrumb');
          breadcrumb ? breadcrumb.after(adminPanel) : document.querySelector('main .container').prepend(adminPanel);
        }

        document.getElementById('btnEliminarProp')?.addEventListener('click', async () => {
          if (!confirm('¿Eliminar esta propiedad? Esta acción no se puede deshacer.')) return;
          try {
            const csrf = await getCsrfToken();
            const r = await fetch(`${PROPS_API}/${id}/`, {
              method: 'DELETE',
              headers: { 'X-CSRFToken': csrf },
              credentials: 'include',
            });
            if (r.status === 204) {
              alert('Propiedad eliminada.');
              window.location.href = 'propiedades.html';
            } else {
              const err = await r.json();
              alert(err.error || 'Error al eliminar.');
            }
          } catch { alert('Error de conexión.'); }
        });
      }

    } catch (err) {
      console.error("Error cargando detalle:", err);
    }
  }

  function seleccionarThumb(i) {
    document.getElementById('mainHeroImg').src = allImgs[i];
    document.querySelectorAll('.thumb-item').forEach((el, idx) => {
      el.classList.toggle('active', idx === i);
    });
  }

  cargarDetalle();
</script>

</body>
</html>
